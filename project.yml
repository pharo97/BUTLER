name: Butler

options:
  bundleIdPrefix: com.butler
  deploymentTarget:
    macOS: "14.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"

targets:
  Butler:
    type: application
    platform: macOS
    sources:
      - path: Butler
    info:
      path: Butler/Resources/Info.plist
      properties:
        CFBundleDisplayName: BUTLER
        CFBundleName: BUTLER
        LSUIElement: true
        NSMicrophoneUsageDescription: "BUTLER uses the microphone for voice input."
        NSSpeechRecognitionUsageDescription: "BUTLER uses speech recognition to understand you."
        NSCalendarsFullAccessUsageDescription: "BUTLER reads your upcoming events to give you timely heads-up before meetings."
        NSCalendarsUsageDescription: "BUTLER reads your upcoming events to give you timely heads-up before meetings."
        NSScreenCaptureDescription: "BUTLER reads your screen to understand what you are working on and give smarter, context-aware responses."
        NSHumanReadableCopyright: ""
    entitlements:
      path: Butler/Resources/Butler.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.butler.app
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - sdk: WebKit.framework
      - sdk: Speech.framework
      - sdk: AVFoundation.framework
      - sdk: Security.framework
      - sdk: EventKit.framework
      - sdk: Vision.framework
      - sdk: ScreenCaptureKit.framework
      - sdk: CoreMedia.framework
      - sdk: CoreImage.framework
      - package: GRDB
        product: GRDB
